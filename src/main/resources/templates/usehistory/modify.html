<html lang="en">
<head>

    <title>Title</title>
</head>
<body>
    <h3> 수정할 메뉴의 정보를 입력하세요. </h3>
    <h3>신규 메뉴 수정</h3>
    <form action="/menu/modify" method="post">
        <label>메뉴 이름 : </label>
        <label>수정할 메뉴 이름 : </label><select name="name" id="name"></select><br>
        <label>수정할 메뉴 가격 : </label><input type="number" name="price"><br>

        <select name="categoryCode" id="categoryCode"></select><br>
        <label>수정할 판매 상태 : </label>
        <select name="orderableStatus">
            <option value="Y">Y</option>
            <option value="N">N</option>
        </select>
        <br>
        <input type="submit" value="수정">
    </form>
