<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>이용내역</title>
    <script>
        const successMessage = `[[${ successMessage }]]`;
        if(successMessage) {
            alert(successMessage);
        }
    </script>
</head>
<body>
<div th:replace="~{common/header.html}"></div>

<form id="searchForm" th:action="@{/templates/usehistory/list}" method="get" style="text-align: center;">
    <div class="search-form-container">
        <select name="categoryCode" style="padding: 5px;">
            <option value="">카테고리</option>
            <option value="1" th:selected="${param.categoryCode == '1'}">자전거</option>
            <option value="2" th:selected="${param.categoryCode == '2'}">여행사</option>
            <option value="3" th:selected="${param.categoryCode == '3'}">렌트카</option>
        </select>
        <input type="text" name="merchant" placeholder="가맹점명" th:value="${param.merchant}">
        사용시작일자 <input type="date" name="useStartDate" th:value="${param.useStartDate}">
        사용종료일자 <input type="date" name="useEndDate" th:value="${param.useEndDate}">
        <button type="submit">검색</button>
    </div>
</form>
<br>

<table align="center" border="1">
    <tr>
        <th>순번</th>
        <th>회원번호</th>
        <th>전화번호</th>
        <th>카테고리코드</th>
        <th>가맹점명</th>
        <th>이동거리</th>
        <th>결제일자</th>
        <th>사용시작일자</th>
        <th>사용종료일자</th>
        <th>예약코드</th>
    </tr>
    <tr th:each="usageHistory, i : ${ paging.content }">
        <td th:text="${ paging.pageable.pageNumber * paging.pageable.pageSize + i.count }"></td>
        <td th:text="${ usageHistory.memberNo }"></td>
        <td th:text="${ usageHistory.phoneNum }"></td>
        <td th:text="${ usageHistory.categoryCode }"></td>
        <td th:text="${ usageHistory.merchant }"></td>
        <td th:text="${ usageHistory.distance }"></td>
        <td th:text="${ #dates.format(usageHistory.paymentDate, 'yyyy-MM-dd HH:mm:ss') }"></td>
        <td th:text="${ #dates.format(usageHistory.useStartDate, 'yyyy-MM-dd HH:mm:ss') }"></td>
        <td th:text="${ #dates.format(usageHistory.useEndDate, 'yyyy-MM-dd HH:mm:ss') }"></td>
        <td th:text="${ usageHistory.reservationFlag }"></td>
    </tr>
</table>
<br>

<div style="text-align: center;">
    <a th:href="@{/templates/usehistory/list(page=${paging.number - 1})}" th:if="${paging.hasPrevious()}">이전</a>

    <span th:each="pageNumber : ${#numbers.sequence(0, paging.totalPages - 1)}">
        <a th:if="${pageNumber >= paging.number - 2 and pageNumber <= paging.number + 2}"
           th:href="@{/templates/usehistory/list(page=${pageNumber})}"
           th:text="${pageNumber + 1}"></a>
    </span>

    <a th:href="@{/templates/usehistory/list(page=${paging.number + 1})}" th:if="${paging.hasNext()}">다음</a>
</div>
<br>

<div style="text-align: center">
    <button id="Update">이용내역 수정</button>
    <button id="Delete">이용내역 삭제</button>
</div>
<div id="modifyContainer"></div>

<script>
    document.addEventListener('DOMContentLoaded', () => {

        const modifyBtn = document.getElementById('Update');
        const deleteBtn = document.getElementById('Delete');

        const container = document.getElementById('modifyContainer');

        if (modifyBtn && container) {
            modifyBtn.addEventListener('click', () => {
                fetch('/usageHistory/modify')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('HTTP error ' + response.status);
                        }
                        return response.text();
                    })
                    .then(html => {
                        container.innerHTML = html;
                    })
                    .catch(error => {
                        console.error('Fetch error:', error);
                        container.innerHTML = '<p style="color:#cc2f29;">이용내역 수정 화면을 불러오는 데 실패했습니다.</p>';
                    });
            });
        }

        if (deleteBtn && container) {
            deleteBtn.addEventListener('click', () => {
                fetch('/usageHistory/delete')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('HTTP error ' + response.status);
                        }
                        return response.text();
                    })
                    .then(html => {
                        container.innerHTML = html;
                    })
                    .catch(error => {
                        console.error('Delete fetch error:', error);
                        container.innerHTML = '<p style="color:#cc2f29;">이용내역 삭제 화면을 불러오는 데 실패했습니다.</p>';
                    });
            });
        }
    });
</script>
</body>
</html>
