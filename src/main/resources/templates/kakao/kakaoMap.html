<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>따릉이 예약 챗봇</title>

  <link rel="stylesheet" href="/css/kakao.css" />

</head>
<body>
<div class="chat-app">
  <!-- 상단 메뉴바 -->
  <div class="chat-header">
    <div class="logo">메뉴바</div>
    <div class="user-profile">
      <img src="/images/profile.png" />
    </div>
  </div>

  <!-- 채팅 메시지 영역 -->
  <div class="chat-body" id="chatBody">
    <div class="user-msg">따릉이 예약해줘.</div>
    <div class="bot-msg">예약 확인 중입니다.</div>
    <div class="map-container"><div id="map"></div></div>
    <div id="info"></div>
    <div class="bot-msg"><b>예약하시겠습니까?</b></div>
    <div class="actions">
      <button class="btn" id="reserveBtn" disabled>예약</button>
    </div>
  </div>

  <!-- 입력창 -->
  <div class="chat-input">
    <div class="input-shell">
      <button class="icon-btn mic" aria-label="Mic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V6a3 3 0 0 1 3-3z"/>
          <path d="M19 10a7 7 0 0 1-14 0"/>
          <path d="M12 17v4"/>
          <path d="M8 21h8"/>
        </svg>
      </button>
      <input  type="text" placeholder="ex)  따릉이 예약해줘 / 여행사 예약해줘" />
      <button class="icon-btn send" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- 카카오 지도 SDK -->
<script th:src="@{//dapi.kakao.com/v2/maps/sdk.js(appkey=${kakaoAPIkey})}"></script>
<script src="/javascript/kakao.js"></script>
</body>
</html>
